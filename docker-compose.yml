version: "3.9"

services:

  mongodb:
    image: mongo:8
    container_name: mongodb

    restart: always

    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend

    container_name: backend

    restart: always

    ports:
      - "5000:5000"

    depends_on:
      - mongodb

    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend

    container_name: frontend

    restart: always

    ports:
      - "3000:3000"

    depends_on:
      - backend

    env_file:
      - ./frontend/.env.local

volumes:

  mongo_data: