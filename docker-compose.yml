version: "3.9"

services:
  mongodb:
    image: mongo:8
    container_name: mongodb

    restart: unless-stopped

    ports:
      - "27017:27017"

    volumes:
      - mongodb_data:/data/db

  backend:
    build:
      context: ./backend

    container_name: backend

    restart: unless-stopped

    ports:
      - "5000:5000"

    env_file:
      - ./backend/.env.docker

    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend

    container_name: frontend

    restart: unless-stopped

    ports:
      - "3000:3000"

    env_file:
      - ./frontend/.env.docker

    depends_on:
      - backend

volumes:
  mongodb_data: